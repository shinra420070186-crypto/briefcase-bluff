<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>The Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#050505" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="The Deck" />
    <link rel="apple-touch-icon" href="/icon-512.png" />

    <style>
      /* FORCE FULL SCREEN COVERAGE */
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #050505;
        overflow: hidden;
        position: fixed; /* Prevents accidental scrolls/pull-to-refresh */
        width: 100%;
      }

      #root {
        height: 100%;
        width: 100%;
        /* Keep content safe from the notch, but allow background to bleed */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }

      /* Hack to ensure background gradients/stars cover the notch */
      .bg-container-fix {
        position: absolute;
        top: -100px; /* Bleed up past the notch */
        left: 0;
        right: 0;
        bottom: 0;
        z-index: -1;
      }
    </style>
  </head>
  <body class="select-none touch-none overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
