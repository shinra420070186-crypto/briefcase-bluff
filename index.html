<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>The Deck</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#050505" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="The Deck" />
    <link rel="apple-touch-icon" href="/icon-512.png" />

    <style>
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #050505;
        /* Prevent bounce scrolling on mobile */
        overscroll-behavior: none;
        overflow: hidden;
      }

      #root {
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        /* Padding ensures content stays inside safe area while background bleeds out */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      /* Fix for Android Chrome Notch bleed */
      @media all and (display-mode: fullscreen) {
        body {
          margin: 0;
          padding: 0;
        }
      }
    </style>
  </head>
  <body class="select-none touch-none overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js');
        });
      }
    </script>
  </body>
</html>
